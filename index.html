<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#FDF8F3;--bg2:#F5EDE0;--bg3:#EDE0CC;
  --text:#1A1208;--text2:#8A7050;--text3:#BBA880;
  --border:rgba(180,140,80,0.18);--border2:rgba(180,140,80,0.32);
  --accent:#D4741A;--accent2:#B05A10;
  --success:#2A7A4B;--danger:#A83020;

}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;}
#root{max-width:700px;margin:0 auto;padding:2rem 1rem 5rem;}
input[type=text],input[type=number],select,textarea{
  font-family:inherit;font-size:14px;border:1.5px solid var(--border2);
  border-radius:var(--radius);padding:9px 13px;background:var(--bg);
  color:var(--text);outline:none;width:100%;transition:border-color .15s,box-shadow .15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(212,116,26,.12);}
textarea{resize:vertical;min-height:80px;}
button{font-family:inherit;font-size:14px;cursor:pointer;border-radius:var(--radius);border:1.5px solid var(--border2);padding:9px 18px;background:transparent;color:var(--text);transition:background .15s,transform .1s;}
button:hover{background:var(--bg2);}
button:active{transform:scale(.97);}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700;border-radius:999px;padding:10px 22px;}
.btn-accent:hover{background:var(--accent2);border-color:var(--accent2);}
.btn-ghost{background:transparent;color:var(--text2);border-color:var(--border2);border-radius:999px;}
.btn-ghost:hover{background:var(--bg2);}
.btn-danger{color:var(--danger);border-color:rgba(168,48,32,.25);border-radius:999px;}
.btn-danger:hover{background:rgba(168,48,32,.07);}
.btn-sm{padding:5px 12px;font-size:12px;font-weight:600;}
.card{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem 1.3rem;}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;}
.badge{font-size:11px;padding:3px 10px;border-radius:999px;font-weight:700;}
.tabs{display:flex;gap:6px;margin-bottom:1.75rem;flex-wrap:wrap;}
.tab{padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;border-radius:999px;border:1.5px solid var(--border2);background:transparent;color:var(--text2);transition:all .15s;}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.05em;}
.row{display:flex;gap:8px;align-items:center;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.section-title{font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}
.empty{text-align:center;padding:2.5rem;color:var(--text3);font-size:14px;font-weight:600;background:var(--bg2);border-radius:var(--radius-lg);}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:999px;font-size:12px;font-weight:700;border:1.5px solid var(--border2);cursor:pointer;user-select:none;transition:all .12s;background:var(--bg);color:var(--text2);}
.chip.selected{background:var(--accent);color:#fff;border-color:var(--accent);}
.star{font-size:28px;cursor:pointer;line-height:1;transition:transform .1s;color:var(--border2);}

/* ══ CONSTANTS ══════════════════════════════ */
const CURRENCIES=[
  {code:'EUR',symbol:'€'},{code:'USD',symbol:'$'},{code:'GBP',symbol:'£'},
  {code:'CHF',symbol:'CHF'},{code:'JPY',symbol:'¥'},{code:'SEK',symbol:'kr'},

/* ══ HELPERS ═════════════════════════════════ */
let _toastTimer;
function showToast(msg){
  const el=document.getElementById('toast');
  if(!el)return;
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}
function initials(name){return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function fmtAmt(amt,currency){
  const c=CURRENCIES.find(x=>x.code===currency)||CURRENCIES[0];
  return currency==='JPY'?`${c.symbol}${Math.round(amt)}`:`${c.symbol}${Number(amt).toFixed(2)}`;
}
// Convert YYYY-MM-DD to DD.MM.YYYY for display
function fmtDate(iso){
  if(!iso)return'';
  const m=iso.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  return m?`${m[3]}.${m[2]}.${m[1]}`:iso;
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function simplifyDebts(balances){
  const cred=[],debt=[];
  Object.entries(balances).forEach(([p,b])=>{
    if(b>0.005)cred.push({person:p,amount:b});
    else if(b<-0.005)debt.push({person:p,amount:-b});
  });
  cred.sort((a,b)=>b.amount-a.amount);debt.sort((a,b)=>b.amount-a.amount);
  const txs=[];let i=0,j=0;
  while(i<cred.length&&j<debt.length){
    const amt=Math.min(cred[i].amount,debt[j].amount);
    txs.push({from:debt[j].person,to:cred[i].person,amount:amt});
    cred[i].amount-=amt;debt[j].amount-=amt;
    if(cred[i].amount<0.005)i++;if(debt[j].amount<0.005)j++;
  }
  return txs;
}

/* ══ CSV PARSER ══════════════════════════════ */
function parseCsv(text,people){
  // Supports ; and , as delimiter, optional quotes
  const lines=text.trim().split(/\r?\n/).filter(Boolean);
  if(lines.length<2)throw new Error('CSV leer oder ungültig');
  const delim=lines[0].includes(';')?';':',';
  const parseRow=row=>row.split(delim).map(c=>c.trim().replace(/^["']|["']$/g,''));
  const headers=parseRow(lines[0]).map(h=>h.toLowerCase());
  const idx={
    person:  headers.findIndex(h=>h.includes('person')),
    desc:    headers.findIndex(h=>h.includes('beschreibung')||h.includes('desc')),
    amount:  headers.findIndex(h=>h.includes('betrag')||h.includes('amount')),
    currency:headers.findIndex(h=>h.includes('währung')||h.includes('currency')||h.includes('waehrung')),
    ratio:   headers.findIndex(h=>h.includes('aufteil')||h.includes('ratio')||h.includes('anteil')),
    date:    headers.findIndex(h=>h.includes('datum')||h.includes('date')),
  };
  if(idx.person<0||idx.desc<0||idx.amount<0)throw new Error('Pflicht-Spalten fehlen: Person, Beschreibung, Betrag');

  const allPeople=new Set(people);
  const expenses=[];
  const errors=[];

  lines.slice(1).forEach((line,i)=>{
    const row=parseRow(line);
    const person=(row[idx.person]||'').trim();
    const desc=(row[idx.desc]||'').trim();
    const amount=parseFloat((row[idx.amount]||'').replace(',','.'));
    const currency=idx.currency>=0?(row[idx.currency]||'EUR').toUpperCase():'EUR';
    const ratio=idx.ratio>=0?parseFloat((row[idx.ratio]||'1').replace(',','.')):1;
    // Date: accept MM.DD.YY, DD.MM.YYYY, YYYY-MM-DD, or fallback to today
    let date=new Date().toISOString().slice(0,10);
    if(idx.date>=0&&row[idx.date]){
      const raw=row[idx.date].trim();
      // MM.DD.YY  e.g. 07.15.24
      const mdyShort=raw.match(/^(\d{1,2})\.(\d{1,2})\.(\d{2})$/);
      // DD.MM.YYYY e.g. 15.07.2024
      const dmyLong=raw.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
      // YYYY-MM-DD e.g. 2024-07-15
      const isoFmt=/^\d{4}-\d{2}-\d{2}$/.test(raw);
      if(mdyShort){
        const year=parseInt(mdyShort[3])<50?`20${mdyShort[3]}`:`19${mdyShort[3]}`;
        date=`${year}-${mdyShort[1].padStart(2,'0')}-${mdyShort[2].padStart(2,'0')}`;
      } else if(dmyLong){
        date=`${dmyLong[3]}-${dmyLong[2].padStart(2,'0')}-${dmyLong[1].padStart(2,'0')}`;
      } else if(isoFmt){
        date=raw;
      }
    }

    if(!person||!desc||isNaN(amount)){errors.push(`Zeile ${i+2}: ungültig`);return;}
    if(isNaN(ratio)||Math.abs(ratio)>1){errors.push(`Zeile ${i+2}: Aufteilverhältnis muss zwischen -1 und 1 liegen`);return;}
    allPeople.add(person);

    // payer pays their own share = amount*ratio
    // rest split equally among all OTHER known people at import time
    const payerShare=Math.round(amount*ratio*100)/100;
    const splits={[person]:payerShare};
    // remaining split note: stored as ratio-based, resolved after import when people list is known
    expenses.push({id:uid(),desc,amount,currency,paidBy:person,splits,_ratio:ratio,date});
  });

  return {expenses,newPeople:[...allPeople].filter(p=>!people.includes(p)),errors};
}

/* ══ STARS ════════════════════════════════════ */
function Stars({value,onChange,hovered,setHovered}){
  return(
    <div style={{display:'flex',gap:3}}>
      {[1,2,3,4,5].map(n=>(
        <span key={n} className={`star ${n<=(hovered||value)?'active':''}`}
          onClick={()=>onChange(n)} onMouseEnter={()=>setHovered(n)} onMouseLeave={()=>setHovered(0)}>★</span>
      ))}
    </div>
  );
}

/* ══ LOGIN ════════════════════════════════════ */
function LoginScreen(){
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const signIn=async()=>{
    setLoading(true);setErr('');
    try{
      await _auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    }catch(e){if(e.code!=='auth/popup-closed-by-user')setErr('Anmeldung fehlgeschlagen: '+e.message);}
    setLoading(false);
  };
  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem'}}>

        <p style={{fontSize:13,color:'var(--text2)',fontWeight:600,marginBottom:'2rem'}}>Melde dich an um loszulegen</p>
        <button onClick={signIn} disabled={loading} style={{width:'100%',padding:'12px 20px',borderRadius:999,background:'var(--text)',color:'var(--bg)',border:'none',fontSize:15,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10,opacity:loading?0.7:1}}>
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 20-8.9 20-20 0-1.3-.1-2.7-.4-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16.1 18.9 13 24 13c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.5 35.6 26.8 36.5 24 36.5c-5.2 0-9.6-3.4-11.2-8.1l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.3-2.3 4.3-4.3 5.8l6.2 5.2C40.5 35.8 44 30.3 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
          {loading?'Anmelden…':'Mit Google anmelden'}

}

/* ══ REVIEWS ══════════════════════════════════ */
function ReviewSection({reviews,onSave}){
  const [name,setName]=useState('');
  const [stars,setStars]=useState(0);
  const [hovered,setHovered]=useState(0);
  const [comment,setComment]=useState('');
  const labels=['','Schlecht','Ausbaufähig','Ok','Gut','Ausgezeichnet'];
  const submit=()=>{
    if(!name.trim()){alert('Bitte Namen eintragen.');return;}
    if(!stars){alert('Bitte Bewertung abgeben.');return;}
    onSave([{id:Date.now(),name:name.trim(),stars,comment:comment.trim(),ts:new Date().toISOString()},...reviews]);
    setName('');setStars(0);setComment('');showToast('Bewertung gespeichert ✓');
  };
  const del=id=>{if(!window.confirm('Bewertung löschen?'))return;onSave(reviews.filter(r=>r.id!==id));};
  const avg=reviews.length?(reviews.reduce((s,r)=>s+r.stars,0)/reviews.length).toFixed(1):null;
  const fmtDate=iso=>{const d=new Date(iso);return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})+', '+d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});};
  return(
    <div style={{marginTop:'3rem'}}>
      <hr className="divider"/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',flexWrap:'wrap',gap:10,marginBottom:'1.5rem'}}>
        <div>
          <h2 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.03em'}}>Bewertungen <span style={{color:'var(--accent)'}}>★</span></h2>
          <p style={{fontSize:13,color:'var(--text2)',marginTop:3}}>Wie gefällt dir der Ausgaben-Splitter?</p>
        </div>
        {avg&&(<div style={{background:'#FDE8D0',borderRadius:'var(--radius-lg)',padding:'10px 18px',display:'flex',alignItems:'center',gap:8}}><span style={{color:'#E8A020',fontSize:22,lineHeight:1}}>★</span><span style={{fontSize:22,fontWeight:800,color:'#B05A10',letterSpacing:'-0.03em'}}>{avg}</span><span style={{fontSize:12,color:'#C07840',fontWeight:700}}>/5 · {reviews.length} {reviews.length===1?'Bewertung':'Bewertungen'}</span></div>)}
      </div>
      <div className="card" style={{marginBottom:'1.5rem',border:'1.5px solid var(--border2)'}}>
        <p className="section-title" style={{marginBottom:16}}>Neue Bewertung</p>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div><label className="label">Dein Name *</label><input type="text" placeholder="z.B. Max Mustermann" value={name} onChange={e=>setName(e.target.value)}/></div>
          <div><label className="label">Bewertung *</label><Stars value={stars} onChange={setStars} hovered={hovered} setHovered={setHovered}/>{stars>0&&<p style={{fontSize:12,color:'var(--accent)',marginTop:5,fontWeight:700}}>{labels[stars]}</p>}</div>
          <div><label className="label">Kommentar (optional)</label><textarea placeholder="Was gefällt dir?" value={comment} onChange={e=>setComment(e.target.value)}/></div>
          <div style={{display:'flex',justifyContent:'flex-end'}}><button className="btn-accent" onClick={submit}>Speichern</button></div>
        </div>
      </div>
      {reviews.length===0?<div className="empty">Noch keine Bewertungen ★</div>:(
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {reviews.map(r=>(
            <div key={r.id} className="card">
              <div className="row" style={{justifyContent:'space-between',marginBottom:r.comment?10:0}}>
                <div className="row" style={{gap:12}}><div className="avatar" style={{width:40,height:40,fontSize:13,background:'#FDE8D0',color:'#B05A10'}}>{initials(r.name)}</div><div><p style={{fontSize:14,fontWeight:800}}>{r.name}</p><p style={{fontSize:11,color:'var(--text3)',marginTop:1}}>{fmtDate(r.ts)}</p></div></div>
                <div style={{display:'flex',alignItems:'center',gap:12}}><span style={{color:'#E8A020',fontSize:16,letterSpacing:1}}>{'★'.repeat(r.stars)}{'☆'.repeat(5-r.stars)}</span><button className="btn-sm btn-danger" onClick={()=>del(r.id)}>✕</button></div>
              </div>
              {r.comment&&<p style={{fontSize:14,color:'var(--text2)',lineHeight:1.6,paddingTop:10,borderTop:'1.5px solid var(--border)'}}>{r.comment}</p>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ══ GROUPS OVERVIEW ══════════════════════════ */
function GroupsOverview({groups,onSelect,onNew,onDelete}){
  const [newName,setNewName]=useState('');
  const create=()=>{
    const n=newName.trim();
    if(!n)return;
    onNew(n);setNewName('');
  };
  return(
    <div>
      <div className="row" style={{marginBottom:'1rem'}}>
        <input type="text" placeholder="Neue Gruppe z.B. Urlaub 2024…" value={newName}
          onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&create()} style={{flex:1}}/>
        <button className="btn-accent" onClick={create} style={{whiteSpace:'nowrap'}}>+ Gruppe</button>
      </div>
      {groups.length===0?(
        <div className="empty">Noch keine Gruppen – erstelle deine erste Gruppe!</div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {groups.map(g=>(
            <div key={g.id} className="card row" style={{justifyContent:'space-between',cursor:'pointer'}} onClick={()=>onSelect(g.id)}>
              <div className="row" style={{gap:12}}>
                <div style={{width:42,height:42,borderRadius:'var(--radius)',background:'#FDE8D0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>📁</div>
                <div>
                  <p style={{fontSize:15,fontWeight:800}}>{g.name}</p>
                  <p style={{fontSize:12,color:'var(--text3)',fontWeight:600}}>
                    {g.people.length} Personen · {g.expenses.length} Ausgaben
                    {g.expenses.length>0&&' · '+ [...new Set(g.expenses.map(e=>e.currency))].join(', ')}
                  </p>
                </div>
              </div>
              <button className="btn-sm btn-danger" onClick={e=>{e.stopPropagation();onDelete(g.id,g.name);}}>Löschen</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ══ GROUP DETAIL ═════════════════════════════ */
function GroupDetail({group,onUpdate,onBack,personColorFn}){
  const {people,expenses,payments=[]}=group;
  const [tab,setTab]=useState('expenses');
  const [newPerson,setNewPerson]=useState('');
  const [showForm,setShowForm]=useState(false);
  const [editingId,setEditingId]=useState(null);
  const [form,setForm]=useState({desc:'',amount:'',currency:'EUR',paidBy:'',participants:[],splitMode:'equal',customSplits:{},pctSplits:{},date:''});
  const [showPaymentForm,setShowPaymentForm]=useState(false);
  const [editingPaymentId,setEditingPaymentId]=useState(null);
  const [paymentForm,setPaymentForm]=useState({from:'',to:'',amount:'',currency:'EUR',date:'',note:''});
  const csvRef=useRef();
  const exportRef=useRef();

  const exportCsv=()=>{
    if(expenses.length===0){showToast('Keine Ausgaben zum Exportieren');return;}
    const rows=[['Person','Beschreibung','Betrag','Währung','Aufteilverhältnis','Datum']];
    [...expenses].sort((a,b)=>a.date<b.date?1:-1).forEach(e=>{
      const ratio=e.amount!==0?Math.round(e.splits[e.paidBy]/e.amount*100)/100:'';
      rows.push([e.paidBy,e.desc,e.amount,e.currency,ratio,fmtDate(e.date)]);
    });
    const csv=rows.map(r=>r.join(';')).join('\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    exportRef.current.href=url;
    exportRef.current.download=`${group.name.replace(/[^a-zA-Z0-9äöüÄÖÜß]/g,'_')}_Ausgaben.csv`;
    exportRef.current.click();
    URL.revokeObjectURL(url);
    showToast('CSV exportiert ✓');
  };

  const personColor=name=>personColorFn(name,people);

  const update=patch=>onUpdate({...group,...patch});
  const setPeople=v=>update({people:typeof v==='function'?v(people):v});
  const setExpenses=v=>update({expenses:typeof v==='function'?v(expenses):v});
  const setPayments=v=>update({payments:typeof v==='function'?v(payments):v});

  const openPaymentForm=()=>{
    setEditingPaymentId(null);
    setPaymentForm({from:people[0]||'',to:people[1]||'',amount:'',currency:'EUR',date:new Date().toISOString().slice(0,10),note:''});
    setShowPaymentForm(true);
  };
  const openEditPayment=p=>{
    setEditingPaymentId(p.id);
    setPaymentForm({from:p.from,to:p.to,amount:String(p.amount),currency:p.currency,date:p.date,note:p.note||''});
    setShowPaymentForm(true);
  };
  const savePayment=()=>{
    if(!paymentForm.from||!paymentForm.to||!paymentForm.amount){alert('Von, An und Betrag sind Pflicht.');return;}
    if(paymentForm.from===paymentForm.to){alert('Von und An dürfen nicht gleich sein.');return;}
    const amt=parseFloat(paymentForm.amount);
    if(isNaN(amt)||amt<=0){alert('Ungültiger Betrag.');return;}
    const entry={id:editingPaymentId||uid(),from:paymentForm.from,to:paymentForm.to,amount:amt,currency:paymentForm.currency,date:paymentForm.date||new Date().toISOString().slice(0,10),note:paymentForm.note.trim()};
    if(editingPaymentId){
      setPayments(ps=>ps.map(p=>p.id===editingPaymentId?entry:p));
      showToast('Zahlung aktualisiert ✓');
    } else {
      setPayments(ps=>[...ps,entry]);
      showToast('Zahlung gespeichert ✓');
    }
    setShowPaymentForm(false);setEditingPaymentId(null);
  };
  const deletePayment=(id)=>{
    if(!window.confirm('Zahlung löschen?'))return;
    setPayments(ps=>ps.filter(p=>p.id!==id));
    showToast('Zahlung gelöscht');
  };

  const addPerson=()=>{
    const n=newPerson.trim();if(!n)return;
    if(people.includes(n)){showToast('Person bereits vorhanden');return;}
    setPeople([...people,n]);setNewPerson('');showToast(`${n} hinzugefügt ✓`);
  };
  const removePerson=p=>{
    if(!window.confirm(`${p} entfernen?`))return;
    onUpdate({...group,people:people.filter(x=>x!==p),expenses:expenses.filter(e=>e.paidBy!==p)});
    showToast(`${p} entfernt`);
  };

  const openForm=()=>{
    setEditingId(null);
    setForm({desc:'',amount:'',currency:'EUR',paidBy:people[0]||'',participants:[...people],splitMode:'equal',customSplits:{},pctSplits:{},date:new Date().toISOString().slice(0,10)});
    setShowForm(true);
  };

  const openEdit=e=>{
    const pctSplits={};
    Object.entries(e.splits).forEach(([p,share])=>{pctSplits[p]=(e.amount!==0?(share/e.amount*100):0).toFixed(1);});
    setEditingId(e.id);
    setForm({
      desc:e.desc, amount:String(e.amount), currency:e.currency,
      paidBy:e.paidBy, participants:Object.keys(e.splits),
      splitMode:'custom',
      customSplits:Object.fromEntries(Object.entries(e.splits).map(([k,v])=>[k,String(v)])),
      pctSplits,
      date:e.date&&e.date.match(/^\d{4}-\d{2}-\d{2}$/)?e.date:new Date().toISOString().slice(0,10)
    });
    setShowForm(true);
  };
  const toggleParticipant=p=>setForm(f=>({...f,participants:f.participants.includes(p)?f.participants.filter(x=>x!==p):[...f.participants,p]}));

  const saveExpense=()=>{
    if(!form.desc.trim()||form.amount===''||form.amount===undefined||!form.paidBy||form.participants.length===0){alert('Bitte alle Pflichtfelder ausfüllen.');return;}
    const amt=parseFloat(form.amount);
    let splits={};
    if(form.splitMode==='equal'){
      const sh=amt/form.participants.length;
      form.participants.forEach(p=>splits[p]=sh);
    } else if(form.splitMode==='percent'){
      const totalPct=form.participants.reduce((s,p)=>s+(parseFloat(form.pctSplits[p])||0),0);
      if(Math.abs(totalPct-100)>0.1){alert(`Prozente müssen 100% ergeben (aktuell: ${totalPct.toFixed(1)}%)`);return;}
      form.participants.forEach(p=>{splits[p]=Math.round(amt*(parseFloat(form.pctSplits[p])||0)/100*100)/100;});
    } else {
      const total=Object.values(form.customSplits).reduce((s,v)=>s+(parseFloat(v)||0),0);
      if(Math.abs(total-amt)>0.02){alert('Summe stimmt nicht überein.');return;}
      splits=Object.fromEntries(Object.entries(form.customSplits).map(([k,v])=>[k,parseFloat(v)||0]));
    }
    const entry={id:editingId||uid(),desc:form.desc.trim(),amount:amt,currency:form.currency,paidBy:form.paidBy,splits,date:form.date||new Date().toISOString().slice(0,10)};
    if(editingId){
      setExpenses(ex=>ex.map(e=>e.id===editingId?entry:e));
      showToast('Ausgabe aktualisiert ✓');
    } else {
      setExpenses(ex=>[...ex,entry]);
      showToast('Ausgabe gespeichert ✓');
    }
    setShowForm(false);setEditingId(null);
  };

  const deleteExpense=(id,desc)=>{
    if(!window.confirm(`„${desc}" löschen?`))return;
    setExpenses(ex=>ex.filter(e=>e.id!==id));showToast('Gelöscht');
  };

  /* CSV Import */
  const handleCsv=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const {expenses:imported,newPeople,errors}=parseCsv(ev.target.result,people);
        if(errors.length>0&&imported.length===0){alert('Import-Fehler:\n'+errors.join('\n'));return;}
        // Resolve remaining splits among all people (existing + new)
        const allPeople=[...people,...newPeople];
        const resolved=imported.map(exp=>{
          const ratio=exp._ratio??1;
          const payerShare=exp.splits[exp.paidBy];
          const remaining=exp.amount-payerShare;
          const others=allPeople.filter(p=>p!==exp.paidBy);
          const splits={...exp.splits};
          if(others.length>0&&remaining>0.005){
            const perPerson=Math.round(remaining/others.length*100)/100;
            others.forEach(p=>splits[p]=(splits[p]||0)+perPerson);
          }
          const {_ratio,...clean}=exp;
          return{...clean,splits};
        });
        onUpdate({...group,people:allPeople,expenses:[...expenses,...resolved]});
        let msg=`${resolved.length} Ausgaben importiert`;
        if(newPeople.length>0)msg+=` · ${newPeople.length} neue Personen: ${newPeople.join(', ')}`;
        if(errors.length>0)msg+=` · ${errors.length} Fehler (Konsole)`;
        showToast(msg);
        if(errors.length>0)console.warn('CSV Import-Fehler:',errors);
      }catch(err){alert('CSV-Fehler: '+err.message);}
      e.target.value='';
    };
    reader.readAsText(file);
  };

  /* ── Computed ── */
  const usedCurrencies=[...new Set([...expenses.map(e=>e.currency),...payments.map(p=>p.currency)])];
  const settlementByCurrency=useMemo(()=>{
    const result={};
    usedCurrencies.forEach(cur=>{
      const balances={};people.forEach(p=>balances[p]=0);
      // Expense-based balances
      expenses.filter(e=>e.currency===cur).forEach(e=>{
        if(balances[e.paidBy]!==undefined)balances[e.paidBy]+=e.amount;
        Object.entries(e.splits).forEach(([p,share])=>{if(balances[p]!==undefined)balances[p]-=share;});
      });
      // Apply recorded payments: payer's balance increases, receiver's decreases
      payments.filter(p=>p.currency===cur).forEach(p=>{
        if(balances[p.from]!==undefined)balances[p.from]+=p.amount;
        if(balances[p.to]!==undefined)balances[p.to]-=p.amount;
      });
      result[cur]={balances,transactions:simplifyDebts({...balances})};
    });
    return result;
  },[expenses,payments,people,usedCurrencies.join()]);

  const totalByCurrency=useMemo(()=>{
    const t={};expenses.forEach(e=>{t[e.currency]=(t[e.currency]||0)+e.amount;});return t;
  },[expenses]);

  const totalTxCount=usedCurrencies.reduce((s,c)=>s+(settlementByCurrency[c]?.transactions.length||0),0);

  const customTotal=useMemo(()=>
    form.splitMode==='custom'?Object.values(form.customSplits).reduce((s,v)=>s+(parseFloat(v)||0),0):0,
  [form.customSplits,form.splitMode]);

  const pctTotal=useMemo(()=>
    form.splitMode==='percent'?form.participants.reduce((s,p)=>s+(parseFloat(form.pctSplits[p])||0),0):0,
  [form.pctSplits,form.splitMode,form.participants]);

  /* ── Reusable expense form fields ── */
  const expenseFormFields=()=>(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <div className="grid2">
        <div style={{gridColumn:'1/-1'}}><label className="label">Beschreibung *</label><input type="text" placeholder="z.B. Hotel, Abendessen…" value={form.desc} onChange={e=>setForm({...form,desc:e.target.value})}/></div>
      </div>
      <div className="grid2">
        <div><label className="label">Betrag *</label><input type="number" placeholder="0.00" step="0.01" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})}/></div>
        <div><label className="label">Währung</label>
          <select value={form.currency} onChange={e=>setForm({...form,currency:e.target.value})}>
            {CURRENCIES.map(c=><option key={c.code} value={c.code}>{c.code} ({c.symbol})</option>)}
          </select>
        </div>
      </div>
      <div className="grid2">
        <div><label className="label">Bezahlt von *</label>
          <select value={form.paidBy} onChange={e=>setForm({...form,paidBy:e.target.value})}>
            {people.map(p=><option key={p} value={p}>{p}</option>)}
          </select>
        </div>
        <div><label className="label">Datum</label>
          <input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/>
        </div>
      </div>
      <div>
        <label className="label">Beteiligte Personen *</label>
        <div style={{display:'flex',flexWrap:'wrap',gap:7,marginTop:5}}>
          {people.map(p=>{const [bg,tc]=personColor(p);const sel=form.participants.includes(p);return(
            <div key={p} className={`chip ${sel?'selected':''}`}
              style={sel?{}:{background:bg,color:tc,borderColor:'transparent'}}
              onClick={()=>toggleParticipant(p)}>
              <div className="avatar" style={{width:18,height:18,fontSize:9,background:sel?'rgba(255,255,255,.25)':tc+'22',color:sel?'#fff':tc}}>{initials(p)}</div>
              {p}
            </div>
          );})}
        </div>
      </div>
      <div>
        <label className="label">Aufteilung</label>
        <div style={{display:'flex',gap:8}}>
          {[['equal','Gleichmäßig'],['percent','Prozentual'],['custom','Betrag']].map(([mode,lbl])=>(
            <button key={mode} style={{flex:1,borderRadius:'999px',fontWeight:700,fontSize:12,
              background:form.splitMode===mode?'var(--accent)':'transparent',
              color:form.splitMode===mode?'#fff':'var(--text2)',
              borderColor:form.splitMode===mode?'var(--accent)':'var(--border2)'}}
              onClick={()=>setForm({...form,splitMode:mode})}>{lbl}</button>
          ))}
        </div>
      </div>
      {form.splitMode==='equal'&&form.participants.length>0&&form.amount&&(
        <div style={{background:'#FDE8D0',borderRadius:'var(--radius)',padding:'10px 14px'}}>
          <p style={{fontSize:13,color:'#B05A10',fontWeight:700}}>
            Pro Person: <span style={{fontSize:16,fontWeight:800}}>{fmtAmt(parseFloat(form.amount)/form.participants.length,form.currency)}</span>
            <span style={{fontWeight:600,opacity:.7}}> ({form.participants.join(', ')})</span>
          </p>
        </div>
      )}
      {form.splitMode==='percent'&&(
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {form.participants.map(p=>{const [bg,tc]=personColor(p);const pct=parseFloat(form.pctSplits[p])||0;const amt=form.amount?Math.round(parseFloat(form.amount)*pct/100*100)/100:0;return(
            <div key={p} className="row">
              <div className="avatar" style={{width:28,height:28,fontSize:10,background:bg,color:tc,flexShrink:0}}>{initials(p)}</div>
              <span style={{fontSize:13,minWidth:72,color:'var(--text2)',fontWeight:700}}>{p}</span>
              <input type="number" placeholder="0" min="0" max="100" step="0.1" value={form.pctSplits[p]||''} style={{width:'90px'}}
                onChange={e=>setForm({...form,pctSplits:{...form.pctSplits,[p]:e.target.value}})}/>
              <span style={{fontSize:13,color:'var(--text3)',fontWeight:600}}>%</span>
              {form.amount&&<span style={{fontSize:12,color:'var(--text2)',marginLeft:4}}>= {fmtAmt(amt,form.currency)}</span>}
            </div>
          );})}
          <div style={{display:'flex',gap:8,alignItems:'center',paddingLeft:4}}>
            <p style={{fontSize:12,fontWeight:800,color:Math.abs(pctTotal-100)<0.1?'var(--success)':'var(--danger)'}}>
              Gesamt: {pctTotal.toFixed(1)}% {Math.abs(pctTotal-100)<0.1?'✓':'– muss 100% ergeben'}
            </p>
            <button style={{fontSize:11,padding:'3px 10px',borderRadius:999}} onClick={()=>{
              const eq=(100/form.participants.length).toFixed(1);
              const splits={};form.participants.forEach(p=>splits[p]=eq);
              setForm({...form,pctSplits:splits});
            }}>Gleichmäßig</button>
          </div>
        </div>
      )}
      {form.splitMode==='custom'&&(
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {form.participants.map(p=>{const [bg,tc]=personColor(p);return(
            <div key={p} className="row">
              <div className="avatar" style={{width:28,height:28,fontSize:10,background:bg,color:tc,flexShrink:0}}>{initials(p)}</div>
              <span style={{fontSize:13,minWidth:72,color:'var(--text2)',fontWeight:700}}>{p}</span>
              <input type="number" placeholder="0.00" step="0.01" value={form.customSplits[p]||''} style={{width:'130px'}}
                onChange={e=>setForm({...form,customSplits:{...form.customSplits,[p]:e.target.value}})}/>
              <span style={{fontSize:13,color:'var(--text3)',fontWeight:600}}>{form.currency}</span>
            </div>
          );})}
          {form.amount&&(
            <p style={{fontSize:12,paddingLeft:4,fontWeight:800,color:Math.abs(customTotal-parseFloat(form.amount||0))<0.02?'var(--success)':'var(--danger)'}}>
              Summe: {fmtAmt(customTotal,form.currency)} / {fmtAmt(parseFloat(form.amount||0),form.currency)}
              {Math.abs(customTotal-parseFloat(form.amount||0))<0.02?' ✓':' – Differenz: '+fmtAmt(Math.abs(customTotal-parseFloat(form.amount||0)),form.currency)}
            </p>
          )}
        </div>
      )}
      <div className="row" style={{justifyContent:'flex-end',gap:8,marginTop:4,paddingTop:12,borderTop:'1.5px solid var(--border)'}}>
        <button className="btn-ghost" onClick={()=>{setShowForm(false);setEditingId(null);}}>Abbrechen</button>
        <button className="btn-accent" onClick={saveExpense}>{editingId?'Aktualisieren':'Speichern'}</button>
      </div>
    </div>
  );

  return(
    <div>
      {/* Back + title */}
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:'1.5rem'}}>
        <button className="btn-ghost btn-sm" onClick={onBack}>← Gruppen</button>
        <h2 style={{fontSize:20,fontWeight:800,letterSpacing:'-0.03em',flex:1}}>{group.name}</h2>
      </div>

      {/* Stat Strip */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:'1.5rem'}}>
        {[
          {label:'Ausgaben',value:expenses.length,bg:'#FDE8D0',tc:'#B05A10'},
          {label:'Personen',value:people.length,bg:'#E8EDFD',tc:'#2A42B0'},
          {label:'Transaktionen',value:totalTxCount,bg:'#E8FDE8',tc:'#1E7A30'},
        ].map(s=>(
          <div key={s.label} style={{background:s.bg,borderRadius:'var(--radius-lg)',padding:'0.9rem 1rem'}}>
            <p style={{fontSize:26,fontWeight:800,color:s.tc,letterSpacing:'-0.03em',lineHeight:1}}>{s.value}</p>
            <p style={{fontSize:11,fontWeight:700,color:s.tc,opacity:.7,marginTop:3,textTransform:'uppercase',letterSpacing:'.05em'}}>{s.label}</p>
          </div>
        ))}
      </div>

      {/* Tabs */}
      <div className="tabs">
        {[['expenses','Ausgaben'],['people','Personen'],['settlement','Abrechnung']].map(([key,label])=>(
          <button key={key} className={`tab ${tab===key?'active':''}`} onClick={()=>setTab(key)}>{label}</button>
        ))}
      </div>

      {/* ── PERSONEN ── */}
      {tab==='people'&&(
        <div>
          <div className="row" style={{marginBottom:'1rem'}}>
            <input type="text" placeholder="Name hinzufügen…" value={newPerson}
              onChange={e=>setNewPerson(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addPerson()} style={{flex:1}}/>
            <button className="btn-accent" onClick={addPerson} style={{whiteSpace:'nowrap'}}>+ Hinzufügen</button>
          </div>
          {people.length===0?<div className="empty">Noch keine Personen</div>:(
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {people.map(p=>{const [bg,tc]=personColor(p);return(
                <div key={p} className="card row" style={{justifyContent:'space-between'}}>
                  <div className="row" style={{gap:12}}>
                    <div className="avatar" style={{width:42,height:42,fontSize:14,background:bg,color:tc}}>{initials(p)}</div>
                    <div><p style={{fontSize:15,fontWeight:800}}>{p}</p><p style={{fontSize:12,color:'var(--text3)',fontWeight:600}}>{expenses.filter(e=>e.paidBy===p).length} Ausgaben bezahlt</p></div>
                  </div>
                  <button className="btn-sm btn-danger" onClick={()=>removePerson(p)}>Entfernen</button>
                </div>
              );})}
            </div>
          )}
        </div>
      )}

      {/* ── AUSGABEN ── */}
      {tab==='expenses'&&(
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem',flexWrap:'wrap',gap:8}}>
            <div style={{display:'flex',gap:14,flexWrap:'wrap'}}>
              {Object.entries(totalByCurrency).map(([cur,amt])=>(
                <span key={cur} style={{fontSize:13,color:'var(--text2)',fontWeight:600}}>
                  Gesamt: <span style={{fontSize:18,fontWeight:800,letterSpacing:'-0.02em'}}>{fmtAmt(amt,cur)}</span>
                </span>
              ))}
              {expenses.length===0&&<span style={{fontSize:13,color:'var(--text3)',fontWeight:600}}>Noch keine Ausgaben</span>}
            </div>
            <div className="row" style={{gap:8}}>
              <input ref={csvRef} type="file" accept=".csv,.txt" style={{display:'none'}} onChange={handleCsv}/>
              <a ref={exportRef} style={{display:'none'}} aria-hidden="true">x</a>
              <button className="btn-ghost btn-sm" onClick={()=>csvRef.current.click()}>↑ Import</button>
              <button className="btn-ghost btn-sm" onClick={exportCsv}>↓ Export</button>
              <button className="btn-accent" onClick={openForm} disabled={people.length===0}>+ Ausgabe</button>
            </div>
          </div>

          {people.length===0&&!showForm&&(
            <div style={{background:'#FDE8D0',borderRadius:'var(--radius)',padding:'10px 14px',marginBottom:'1rem'}}>
              <p style={{fontSize:13,color:'#8A4010',fontWeight:600}}>Füge zuerst Personen hinzu, dann kannst du Ausgaben erfassen.</p>
            </div>
          )}

          {showForm&&!editingId&&(
            <div className="card" style={{marginBottom:'1.2rem',border:'1.5px solid var(--accent)'}}>
              <p className="section-title" style={{marginBottom:16}}>Neue Ausgabe</p>
              {expenseFormFields()}
            </div>
          )}

          {expenses.length===0?<div className="empty">Klicke auf „+ Ausgabe" um zu beginnen</div>:(
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {[...expenses].sort((a,b)=>a.date<b.date?1:-1).map(e=>{
                const [bg,tc]=personColor(e.paidBy);
                if(editingId===e.id){
                  return(
                    <div key={e.id} className="card" style={{border:'1.5px solid var(--accent)'}}>
                      <p className="section-title" style={{marginBottom:16}}>Ausgabe bearbeiten</p>
                      {expenseFormFields()}
                    </div>
                  );
                }
                return(
                <div key={e.id} className="card">
                  <div className="row" style={{justifyContent:'space-between',marginBottom:10}}>
                    <div className="row" style={{gap:12}}>
                      <div className="avatar" style={{width:42,height:42,fontSize:13,background:bg,color:tc}}>{initials(e.paidBy)}</div>
                      <div><p style={{fontSize:15,fontWeight:800}}>{e.desc}</p><p style={{fontSize:12,color:'var(--text2)',fontWeight:600}}>{e.paidBy} · {fmtDate(e.date)}</p></div>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{fontSize:20,fontWeight:800,letterSpacing:'-0.02em'}}>{fmtAmt(e.amount,e.currency)}</span>
                      <button className="btn-sm btn-ghost" onClick={()=>openEdit(e)} style={{borderRadius:999}}>✎</button>
                      <button className="btn-sm btn-danger" onClick={()=>deleteExpense(e.id,e.desc)}>✕</button>
                    </div>
                  </div>
                  <div style={{borderTop:'1.5px solid var(--border)',paddingTop:8,display:'flex',flexWrap:'wrap',gap:6}}>
                    {Object.entries(e.splits).map(([p,share])=>{const [pbg,ptc]=personColor(p);
                      const pct=e.amount!==0?Math.round(share/e.amount*100):0;
                      return<span key={p} className="badge" style={{background:pbg,color:ptc}}>{p}: {fmtAmt(share,e.currency)} ({pct}%)</span>;
                    })}
                  </div>
                </div>
              );})}
            </div>
          )}

          {/* CSV format hint */}
          <div style={{marginTop:'1.5rem',background:'var(--bg2)',borderRadius:'var(--radius)',padding:'10px 14px'}}>
            <p style={{fontSize:11,fontWeight:700,color:'var(--text3)',marginBottom:4}}>CSV-FORMAT FÜR IMPORT</p>
            <p style={{fontSize:11,fontFamily:'monospace',color:'var(--text2)',lineHeight:1.8}}>
              Person;Beschreibung;Betrag;Währung;Aufteilverhältnis;Datum<br/>
              Anna;Hotel;180;EUR;0.33;15.07.2024<br/>
              <span style={{color:'var(--text3)'}}>Datum: MM.TT.JJ · TT.MM.JJJJ · JJJJ-MM-TT · Aufteilverhältnis: 0–1</span>
            </p>
          </div>
        </div>
      )}

      {/* ── ABRECHNUNG ── */}
      {tab==='settlement'&&(
        <div>
          {/* Zahlungen erfassen */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem',flexWrap:'wrap',gap:8}}>
            <p className="section-title" style={{marginBottom:0}}>Überwiesene Zahlungen</p>
            <button className="btn-ghost btn-sm" onClick={openPaymentForm} disabled={people.length<2}>+ Zahlung erfassen</button>
          </div>

          {showPaymentForm&&(
            <div className="card" style={{marginBottom:'1.2rem',border:'1.5px solid var(--accent)'}}>
              <p className="section-title" style={{marginBottom:14}}>{editingPaymentId?'Zahlung bearbeiten':'Neue Zahlung'}</p>
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                <div className="grid2">
                  <div><label className="label">Von *</label>
                    <select value={paymentForm.from} onChange={e=>{
                      const newFrom=e.target.value;
                      const newTo=paymentForm.to===newFrom?(people.find(p=>p!==newFrom)||''):paymentForm.to;
                      setPaymentForm({...paymentForm,from:newFrom,to:newTo});
                    }}>
                      {people.map(p=><option key={p} value={p}>{p}</option>)}
                    </select>
                  </div>
                  <div><label className="label">An *</label>
                    <select value={paymentForm.to} onChange={e=>{
                      const newTo=e.target.value;
                      const newFrom=paymentForm.from===newTo?(people.find(p=>p!==newTo)||''):paymentForm.from;
                      setPaymentForm({...paymentForm,to:newTo,from:newFrom});
                    }}>
                      {people.map(p=><option key={p} value={p}>{p}</option>)}
                    </select>
                  </div>
                </div>
                <div className="grid2">
                  <div><label className="label">Betrag *</label>
                    <input type="number" placeholder="0.00" min="0" step="0.01" value={paymentForm.amount} onChange={e=>setPaymentForm({...paymentForm,amount:e.target.value})}/>
                  </div>
                  <div><label className="label">Währung</label>
                    <select value={paymentForm.currency} onChange={e=>setPaymentForm({...paymentForm,currency:e.target.value})}>
                      {CURRENCIES.map(c=><option key={c.code} value={c.code}>{c.code} ({c.symbol})</option>)}
                    </select>
                  </div>
                </div>
                <div className="grid2">
                  <div><label className="label">Datum</label>
                    <input type="date" value={paymentForm.date} onChange={e=>setPaymentForm({...paymentForm,date:e.target.value})}/>
                  </div>
                  <div><label className="label">Notiz (optional)</label>
                    <input type="text" placeholder="z.B. Banküberweisung" value={paymentForm.note} onChange={e=>setPaymentForm({...paymentForm,note:e.target.value})}/>
                  </div>
                </div>
                <div className="row" style={{justifyContent:'flex-end',gap:8,paddingTop:10,borderTop:'1.5px solid var(--border)'}}>
                  <button className="btn-ghost" onClick={()=>{setShowPaymentForm(false);setEditingPaymentId(null);}}>Abbrechen</button>
                  <button className="btn-accent" onClick={savePayment}>{editingPaymentId?'Aktualisieren':'Zahlung speichern'}</button>
                </div>
              </div>
            </div>
          )}

          {payments.length>0&&(
            <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:'1.5rem'}}>
              {[...payments].reverse().map(p=>{
                const [fbg,ftc]=personColor(p.from);
                const [,ttc]=personColor(p.to);
                return(
                  <div key={p.id} className="card row" style={{justifyContent:'space-between',background:'#F5EDE0'}}>
                    <div className="row" style={{gap:10,flex:1,minWidth:0}}>
                      <div className="avatar" style={{width:36,height:36,fontSize:12,background:fbg,color:ftc,flexShrink:0}}>{initials(p.from)}</div>
                      <div style={{minWidth:0}}>
                        <p style={{fontSize:13,fontWeight:800}}>
                          <span style={{color:ftc}}>{p.from}</span>
                          <span style={{color:'var(--text3)',margin:'0 6px',fontWeight:400}}>→</span>
                          <span style={{color:ttc}}>{p.to}</span>
                        </p>
                        <p style={{fontSize:11,color:'var(--text3)',fontWeight:600}}>
                          {fmtDate(p.date)}{p.note&&` · ${p.note}`}
                        </p>
                      </div>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
                      <span style={{fontSize:16,fontWeight:800,color:'var(--success)'}}>{fmtAmt(p.amount,p.currency)}</span>
                      <button className="btn-sm btn-ghost" onClick={()=>openEditPayment(p)} style={{borderRadius:999}}>✎</button>
                      <button className="btn-sm btn-danger" onClick={()=>deletePayment(p.id)}>✕</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {payments.length===0&&!showPaymentForm&&(
            <div className="empty" style={{marginBottom:'1.5rem',padding:'1rem'}}>Noch keine Zahlungen erfasst</div>
          )}

          <hr style={{border:'none',borderTop:'1.5px solid var(--border)',marginBottom:'1.5rem'}}/>

          {/* Settlement per currency */}
          {usedCurrencies.length===0?<div className="empty">Noch keine Ausgaben</div>:(
            usedCurrencies.map(cur=>{
              const {balances:curBal,transactions:curTxs}=settlementByCurrency[cur];
              const curPayments=payments.filter(p=>p.currency===cur);
              return(
                <div key={cur} style={{marginBottom:'2rem'}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
                    <span style={{fontSize:11,fontWeight:800,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.08em'}}>Abrechnung</span>
                    <span style={{background:'#FDE8D0',color:'#B05A10',borderRadius:999,padding:'3px 12px',fontSize:13,fontWeight:800}}>{cur}</span>
                    {curPayments.length>0&&<span style={{fontSize:11,color:'var(--success)',fontWeight:700}}>✓ {curPayments.length} Zahlung{curPayments.length>1?'en':''} eingerechnet</span>}
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:10,marginBottom:'1rem'}}>
                    {people.map(p=>{
                      const bal=curBal[p]||0;const isPos=bal>0.005,isNeg=bal<-0.005;const [bg,tc]=personColor(p);
                      return(
                        <div key={p} style={{background:bg,borderRadius:'var(--radius-lg)',padding:'1rem 1.1rem'}}>
                          <div className="row" style={{gap:8,marginBottom:8}}>
                            <div className="avatar" style={{width:28,height:28,fontSize:10,background:'rgba(255,255,255,.5)',color:tc}}>{initials(p)}</div>
                            <span style={{fontSize:13,fontWeight:800,color:tc}}>{p}</span>
                          </div>
                          <p style={{fontSize:22,fontWeight:800,letterSpacing:'-0.03em',color:isPos?'var(--success)':isNeg?'var(--danger)':tc,opacity:isPos||isNeg?1:.5}}>
                            {isNeg?'−':isPos?'+':''}{fmtAmt(Math.abs(bal),cur)}
                          </p>
                          <p style={{fontSize:11,fontWeight:700,color:tc,opacity:.6,marginTop:3}}>{isPos?'bekommt zurück':isNeg?'schuldet':'ausgeglichen'}</p>
                        </div>
                      );
                    })}
                  </div>
                  {curTxs.length===0?<div className="empty" style={{padding:'1rem 1.5rem',fontSize:13}}>Ausgeglichen ✓</div>:(
                    <div style={{display:'flex',flexDirection:'column',gap:8}}>
                      {curTxs.map((t,i)=>{const [fbg,ftc]=personColor(t.from);return(
                        <div key={i} className="card row" style={{justifyContent:'space-between'}}>
                          <div className="row" style={{gap:12}}>
                            <div className="avatar" style={{width:40,height:40,fontSize:13,background:fbg,color:ftc}}>{initials(t.from)}</div>
                            <div>
                              <p style={{fontSize:14,fontWeight:800}}>{t.from}<span style={{color:'var(--text3)',margin:'0 8px',fontWeight:400}}>→</span>{t.to}</p>
                              <p style={{fontSize:11,color:'var(--text3)',fontWeight:600}}>Noch ausstehend #{i+1}</p>
                            </div>
                          </div>
                          <p style={{fontSize:20,fontWeight:800,color:'var(--danger)',letterSpacing:'-0.02em'}}>{fmtAmt(t.amount,cur)}</p>
                        </div>
                      );})}
                    </div>
                  )}
                </div>
              );
            })
          )}
        </div>
      )}
    </div>
  );
}

/* ══ MAIN APP ═════════════════════════════════ */
function App(){
  const [user,setUser]=useState(undefined);
  const [dbData,setDbData]=useState(null);
  const [syncState,setSyncState]=useState('ok');
  const [activeGroupId,setActiveGroupId]=useState(null);
  const unsubSnapshotRef=useRef(null);

  /* Auth */
  useEffect(()=>{
    const unsubAuth=_auth.onAuthStateChanged(u=>{
      setUser(u||null);
      if(u){
        const docRef=_db.collection('splitter').doc(u.uid);
        if(unsubSnapshotRef.current){unsubSnapshotRef.current();unsubSnapshotRef.current=null;}
        unsubSnapshotRef.current=docRef.onSnapshot(
          snap=>{
            if(snap.exists){const d=snap.data();setDbData({groups:d.groups||[],reviews:d.reviews||[]});}
            else{setDbData({groups:[],reviews:[]});}
            setSyncState('ok');
          },
          err=>{console.error('Firestore:',err.code,err.message);setSyncState('error');setDbData(d=>d||{groups:[],reviews:[]});}
        );
      }else{
        if(unsubSnapshotRef.current){unsubSnapshotRef.current();unsubSnapshotRef.current=null;}
        setDbData(null);
      }
    });
    return()=>{unsubAuth();if(unsubSnapshotRef.current)unsubSnapshotRef.current();};
  },[]);

  const save=useCallback(newData=>{
    if(!user)return;
    setSyncState('syncing');
    _db.collection('splitter').doc(user.uid).set(newData).catch(err=>{
      console.error('Save:',err);setSyncState('error');showToast('Fehler beim Speichern!');
    });
  },[user]);

  /* Screens */
  if(user===undefined)return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><p style={{fontSize:16,color:'var(--text3)',fontWeight:600}}>Laden…</p></div>;
  if(user===null)return<LoginScreen/>;
  if(!dbData)return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><p style={{fontSize:16,color:'var(--text3)',fontWeight:600}}>Daten werden geladen…</p></div>;

  const {groups,reviews}=dbData;
  const activeGroup=groups.find(g=>g.id===activeGroupId);

  /* Group mutators */
  const saveGroups=newGroups=>save({...dbData,groups:newGroups});
  const createGroup=name=>{
    const g={id:uid(),name:name.trim(),created:new Date().toISOString(),people:[],expenses:[],payments:[]};
    saveGroups([...groups,g]);showToast(`Gruppe „${name}" erstellt ✓`);
  };
  const deleteGroup=(id,name)=>{
    if(!window.confirm(`Gruppe „${name}" und alle Daten löschen?`))return;
    if(activeGroupId===id)setActiveGroupId(null);
    saveGroups(groups.filter(g=>g.id!==id));showToast('Gruppe gelöscht');
  };
  const updateGroup=updated=>saveGroups(groups.map(g=>g.id===updated.id?updated:g));

  /* Person color (shared across group) */
  const personColorFn=(name,people)=>PERSON_COLORS[people.indexOf(name)%PERSON_COLORS.length]||PERSON_COLORS[0];

  const syncDotColor={ok:'var(--success)',syncing:'#E8A020',error:'var(--danger)'}[syncState];
  const syncLabel={ok:'Echtzeit-Sync aktiv',syncing:'Speichert…',error:'Sync-Fehler'}[syncState];

  return(
    <div>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'2rem',flexWrap:'wrap',gap:10}}>
        <div>
          <h1 style={{fontSize:32,fontWeight:800,letterSpacing:'-0.04em',lineHeight:1}}>split<span style={{color:'var(--accent)'}}>!</span></h1>
          <div style={{display:'flex',alignItems:'center',marginTop:5,gap:6}}>
            <span className={syncState==='syncing'?'syncing':''} style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:syncDotColor,flexShrink:0}}/>
            <span style={{fontSize:12,color:'var(--text2)',fontWeight:600}}>{syncLabel}</span>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
          {user.photoURL&&<img src={user.photoURL} alt="" style={{width:30,height:30,borderRadius:'50%',border:'2px solid var(--border2)'}}/>}
          <span style={{fontSize:12,color:'var(--text2)',fontWeight:600,maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.displayName||user.email||''}</span>
          <button className="btn-ghost btn-sm" onClick={()=>{if(window.confirm('Abmelden?'))_auth.signOut();}}>Abmelden</button>
        </div>
      </div>

      {/* Groups or Group Detail */}
      {!activeGroup?(
        <>
          <p className="section-title">Meine Gruppen</p>
          <GroupsOverview groups={groups} onSelect={setActiveGroupId} onNew={createGroup} onDelete={deleteGroup}/>
        </>
      ):(
        <GroupDetail
          group={activeGroup}
          onUpdate={updateGroup}
          onBack={()=>setActiveGroupId(null)}
          personColorFn={personColorFn}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
